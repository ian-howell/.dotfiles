[metadata]
name = "ssh-hosts"
description = "A channel to select hosts from your SSH config"
requirements = ["grep", "tr", "cut", "awk"]

[source]
command = "eval cat $(awk '/^Include / {print $2}' $HOME/.ssh/config | tr '\n' ' ') $HOME/.ssh/config 2>/dev/null | grep -E '^Host ' | tr -s ' ' | cut -d' ' -f2- | tr ' ' '\n' | grep -v '[*?]' | grep -v '^$' | sort -u"

[preview]
command = "eval cat $(awk '/^Include / {print $2}' $HOME/.ssh/config | tr '\n' ' ') $HOME/.ssh/config 2>/dev/null | awk -v host='{}' '/^Host / { found=0 } $0 ~ \"^Host (.*[[:space:]])?\" host \"([[:space:]].*)?$\" { found=1 } found'"

[keybindings]
enter = "actions:connect"

[actions.connect]
description = "SSH into the selected host"
command = "ssh '{}'"
mode = "execute"
