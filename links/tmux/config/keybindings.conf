# Using Tmux Copy mode:
#
# Enter the copy-mode: prefix [
# Navigate: h, j, k, l, w, W, b, B, {, }
# Search: ?, /
# Start highlight: v
# Yank the highlighted text: Enter
# Paste: prefix ]

###############################################################################
# Key Bindings
###############################################################################
# NOTE: As a general "cleanliness" rule, prefer 'bind' to 'bind-key'

# Unset default prefix
unbind C-b
unbind C-a

# Set Prefix to Ctrl+space
set -g prefix C-space
bind C-space send-prefix

# Create root session
bind-key C-t display-popup -w 80 -h 3 -E -d "#{pane_current_path}" "wt"
bind-key T run-shell "treemux attach-root -d \"$(mktemp -d)\"" # fresh tmpdir session
# Kubernetes context and namespace switchers
bind-key C run-shell "k8s-context-switcher"
bind-key N run-shell "k8s-namespace-switcher"

# Split panes using \ and - (\ because it doesn't require shift)
# Start in same directory when splitting windows
bind \\ split-window -h -c '#{pane_current_path}'
bind - split-window -v -c '#{pane_current_path}'

# Session picker (unified: active + configured + git worktrees, MRU-ordered)
bind C-Space display-popup -w 90% -h 85% -E \
  -d "#{pane_current_path}" \
  -e "TMUX_CLIENT=#{client_name}" \
  "tmux-session-picker"

# Worktree picker
bind C-w display-popup -w 90% -h 85% \
  -d "#{pane_current_path}" \
  -e "TMUX_CLIENT=#{client_name}" \
  "wt"

# -----------------------------------------------------------------------------
# <prefix> C-s  —  built-in session/window chooser
#
# Like <prefix> s (choose-tree -Zs) but sorted by recency (-O time) rather
# than index, with a cleaner key format and aligned recency timestamps.
#
# Line structure rendered by tmux:
#
#   Session row:  [tree-char] [session-name]: [KEY] [-F output]
#   Window row:   [tree-prefix] [KEY] [-F output]
#
# The "session-name" in session rows is hardcoded by tmux and not controllable
# via -F or -K. Its variable width means we cannot naively left-pad the
# timestamp to a fixed column — the effective column shifts with name length.
#
# Dynamic padding trick:
#   We want the session timestamp to land at the same column as window
#   timestamps. The session prefix is "- <name>: " = 4 + len(name) chars.
#   Window timestamps start at column 34 (7-char tree prefix + 25-char padded
#   window name + 2 spaces). So we need 34 - 4 - len(name) = 30 - len(name)
#   chars of padding before the session timestamp.
#
#   tmux's #{p<N>:var} pads var to at least N chars (space-filled on the
#   right). It requires a literal width — it won't accept an expression.
#   The workaround: store the template string "#{p__N__: }" in a user option
#   (@picker_pad_template), substitute the computed width in place of __N__
#   using #{s/__N__/<computed>/:<string>}, then use #{E:...} to run the
#   resulting string (e.g. "#{p22: }") back through the format engine so it
#   actually produces spaces. Without #{E:...}, the substituted string would
#   be output literally rather than evaluated.
#
# Format operators used:
#   #{p<N>:var}         — pad var to at least N chars (space-filled on right)
#   #{e|-|:A,B}         — arithmetic: A - B
#   #{n:var}            — length of var's value
#   #{s/X/Y/:Z}         — substitute X with Y in Z (like sed s///)
#   #{E:expr}           — evaluate the result of expr as a format string
#   #[dim] / #[default] — tmux style attributes: dim and reset
#   #{t/p:var}          — render var (a unix timestamp) as a short
#                         human-readable time, e.g. "10:32" for earlier today
# -----------------------------------------------------------------------------

# Template string for dynamic padding. Must live in a variable so tmux stores
# it as a plain string rather than eagerly evaluating #{p__N__: } as a format
# expression — substitution needs to replace __N__ with the computed width
# before #{E:...} evaluates it.
set -g @picker_pad_template "#{p__N__: }"

# Session row: dynamically padded timestamp, aligned with window timestamps.
# Computes padding as 30 - len(session_name), substitutes it into
# @picker_pad_template, then double-evaluates so #{p<N>: } expands into the
# correct blank field.
set -g @picker_session_format \
  "#{E:#{s/__N__/#{e|-|:30,#{n:session_name}}/:#{@picker_pad_template}}}#{t/p:session_activity}"

# Window row: window name left-padded to 25 chars, followed by a dimmed
# timestamp. The 25-char pad + 2 spaces puts the timestamp at column 34
# relative to the start of -F output, which after the 7-char window tree
# prefix ("├─> N: ") lands at screen column 41.
set -g @picker_window_format \
  "#{p25:#{window_name}}  #[dim]#{t/p:window_activity}#[default]"

# #{@picker_session_format} and #{@picker_window_format} expand to plain
# strings, so #{E:...} is needed to evaluate the format expressions inside.
bind C-s choose-tree -Zs -O time \
  -K "#{line}:" \
  -F "#{?session_format,#{E:#{@picker_session_format}},#{E:#{@picker_window_format}}}"

# When creating a window, start at the same path
bind c new-window -c '#{pane_current_path}' "$SHELL"


# Sane window switching
unbind .
bind m command-prompt -p "Move to index:" "run-shell 'tmux-insert-window %%'"

# Use vim keybindings in copy mode
set -g mode-keys vi

# Visual selection toggles (vim-like)
# v: checks #{selection_present}; if set, just turns rectangle mode off so the current range stays, otherwise begins selection
bind -T copy-mode-vi v if-shell -F "#{selection_present}" "send-keys -X rectangle-off" "send-keys -X begin-selection"
# V: if selecting, turns rectangle off, jumps to the other end, snaps that end to start-of-line, jumps back, snaps to end-of-line
# It's a bit buggy, but it's *way* better than the default behavior.
bind -T copy-mode-vi V if-shell -F "#{selection_present}" "send-keys -X rectangle-off \; send-keys -X other-end \; send-keys -X start-of-line \; send-keys -X other-end \; send-keys -X end-of-line" "send-keys -X select-line"
# C-v: if selecting, toggles rectangle via #{rectangle_toggle} without resetting; if not, begins selection then turns rectangle on
bind -T copy-mode-vi C-v if-shell -F "#{selection_present}" "if-shell -F \"#{rectangle_toggle}\" \"send-keys -X rectangle-off\" \"send-keys -X rectangle-on\"" "send-keys -X begin-selection \; send-keys -X rectangle-on"

# Exit copy mode with Escape
bind -T copy-mode-vi Escape send-keys -X cancel

# TODO: revisit this when you work out clipboard shenanigans
# Easier access to the paster-buffer
bind P paste-buffer
# Copy to clipboard
# TODO: old stuff. Compare to the new stuff below
# bind -T copy-mode-vi 'y' send-keys -X copy-pipe "xclip -sel clip -i"
# # Change default behavior of Enter to match 'y'
# bind -T copy-mode-vi Enter send-keys -X copy-pipe "xclip -sel clip -i"
# TODO: this won't work because it's meant for macs...
bind -T copy-mode-vi y send-keys -X copy-pipe 'reattach-to-user-namespace pbcopy'
unbind -T copy-mode-vi Enter
bind -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel 'reattach-to-user-namespace pbcopy'

# vi-like searching. Prompt first, then enter copy-mode if confirmed, and return to "normal" on escape.
bind / command-prompt -T search -p "(search down)" "copy-mode -e \; send-keys -X search-forward \"%%\""
bind ? command-prompt -T search -p "(search up)" "copy-mode -e \; send-keys -X search-backward \"%%\""

# These (1) switch to copy-mode then (2) scroll up
bind C-y copy-mode \; send-keys -X scroll-up
bind C-u copy-mode \; send-keys -X halfpage-up
bind C-b copy-mode \; send-keys -X page-up

# Fast entry into copy mode
bind -n M-[ copy-mode

# Reload config file
bind C-r source-file ~/.config/tmux/tmux.conf \; display '~/.config/tmux/tmux.conf sourced'

# Shortcuts to dotfiles

# Quickly detach from session
bind C-d detach

# Shortcut keys
bind C-v new-window -c '#{pane_current_path}' -n vim nvim
bind C-o new-window -c '#{pane_current_path}' opencode
bind C-g new-window -c '#{pane_current_path}' -n git lazygit

bind C-l select-window -t "{last}"
bind L switch-client -l

###############################################################################
# Tmux Nagivator - https://github.com/christoomey/vim-tmux-navigator
###############################################################################

# Check if the current pane is a vim or lazygit pane
# NOTE: There is no lazygit-tmux-navigator plugin, so I won't be able to leave the
# lazygit window, but that's ok because lazygit will generally have a dedicated window.
is_vim="ps -o state= -o comm= -t '#{pane_tty}' | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|n?vim?x?)(diff)?$'"
is_lg="ps -o state= -o comm= -t '#{pane_tty}' | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?lazygit$'"
is_fzf="ps -o state= -o comm= -t '#{pane_tty}' | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?fzf$'"

bind -n C-h if-shell "$is_vim || $is_lg || $is_fzf" "send-keys C-h" "select-pane -L"
bind -n C-j if-shell "$is_vim || $is_lg || $is_fzf" "send-keys C-j" "select-pane -D"
bind -n C-k if-shell "$is_vim || $is_lg || $is_fzf" "send-keys C-k" "select-pane -U"
bind -n C-l if-shell "$is_vim || $is_lg || $is_fzf" "send-keys C-l" "select-pane -R"

bind -T copy-mode-vi C-h select-pane -L
bind -T copy-mode-vi C-j select-pane -D
bind -T copy-mode-vi C-k select-pane -U
bind -T copy-mode-vi C-l select-pane -R

###############################################################################
# Popup keymaps
###############################################################################

bind h display-popup -w 90% -h 90% -E -b "rounded" "htop"
