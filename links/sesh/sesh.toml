import = [
	"~/.config/work/sesh/sesh.toml",
]

# Window 0 is always created implicitly by `tmux new-session`. The startup_command
# below renames it to "shell" and focuses it, so it appears first and is selected
# on connect.
[default_session]
startup_command = "tmux rename-window -t :1 shell && tmux select-window -t :1"

# Reusable window definitions (kept for reference, not applied to any session)
[[window]]
name = "vim"
startup_script = "tmux set-option -w automatic-rename off && vim; exit"

[[window]]
name = "opencode"
startup_script = "tmux set-option -w automatic-rename off && opencode; exit"

[[window]]
name = "git"
startup_script = "tmux set-option -w automatic-rename off && lazygit; exit"

# Personal sessions
[[session]]
name = "dotfiles"
path = "~/.dotfiles"
